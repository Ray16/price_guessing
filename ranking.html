<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本周排行榜</title>
  <link rel="stylesheet" href="shared/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .ranking-page { max-width: 700px; margin: 0 auto; padding: 40px 24px; }
    .ranking-page h1 { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .week-label { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .trophy { font-size: 3rem; text-align: center; margin-bottom: 16px; }
    .loading { text-align: center; color: var(--text-muted); padding: 40px; }

    /* Header row showing player names */
    .compare-header {
      display: grid;
      grid-template-columns: 1fr 120px 120px 60px;
      gap: 8px;
      align-items: center;
      padding: 12px 20px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-weight: 600;
    }
    .compare-header .player-col { text-align: center; }

    /* Each game row */
    .game-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px 60px;
      gap: 8px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 20px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .game-row:hover { border-color: var(--primary); }
    .game-name { font-weight: 600; font-size: 0.95rem; }
    .game-emoji { font-size: 1.1rem; margin-right: 6px; }
    .score-cell {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .score-cell.no-score { color: var(--text-muted); font-size: 0.85rem; font-weight: 400; }
    .score-cell.winner { color: #ffd700; }
    .winner-badge { text-align: center; font-size: 1.2rem; }

    /* Total row */
    .total-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px 60px;
      gap: 8px;
      align-items: center;
      border-top: 2px solid var(--border);
      padding: 16px 20px;
      margin-top: 8px;
    }
    .total-label { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .total-score { text-align: center; font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    .total-score.winner { color: #ffd700; }
    .overall-winner { text-align: center; font-size: 1.6rem; }

    /* Player header cards */
    .player-headers {
      display: grid;
      grid-template-columns: 1fr 120px 120px 60px;
      gap: 8px;
      align-items: center;
      padding: 0 20px;
      margin-bottom: 16px;
    }
    .player-header-card {
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 8px;
    }
    .player-header-card .avatar { font-size: 2rem; }
    .player-header-card .pname { font-weight: 700; font-size: 0.95rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="ranking-page">
    <div class="trophy">🏆</div>
    <h1>本周成绩</h1>
    <div class="week-label" id="week-label"></div>
    <div id="ranking-list"><div class="loading">加载中…</div></div>
    <a href="index.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;margin-top:28px">← 返回首页</a>
  </div>

  <script src="shared/hub-data.js"></script>
  <script src="shared/firebase-config.js"></script>
  <script src="shared/player.js"></script>
  <script>
    const AVATARS = { Ray: '👦', Hebe: '👧' };
    const GAME_MAP = {};
    GAMES.forEach(g => { GAME_MAP[g.id] = g; });

    function renderRankings({ Ray, Hebe, weekKey }) {
      document.getElementById('week-label').textContent = `📅 ${weekKey}`;

      // Collect all game IDs that either player has played
      const allGameIds = new Set([
        ...Object.keys(Ray.games),
        ...Object.keys(Hebe.games),
      ]);

      // Sort games: played ones first (by combined score), then unplayed
      const sortedGames = [...allGameIds].sort((a, b) => {
        const aTotal = (Ray.games[a] || 0) + (Hebe.games[a] || 0);
        const bTotal = (Ray.games[b] || 0) + (Hebe.games[b] || 0);
        return bTotal - aTotal;
      });

      const rayTotal = Ray.total || 0;
      const hebeTotal = Hebe.total || 0;
      const rayWins = rayTotal > hebeTotal;
      const tied = rayTotal === hebeTotal;

      let html = '';

      // Player header cards
      html += `<div class="player-headers">
        <div></div>
        <div class="player-header-card">
          <div class="avatar">👦</div>
          <div class="pname">Ray</div>
        </div>
        <div class="player-header-card">
          <div class="avatar">👧</div>
          <div class="pname">Hebe</div>
        </div>
        <div></div>
      </div>`;

      if (sortedGames.length === 0) {
        html += `<div style="text-align:center;color:var(--text-muted);padding:40px 0">本周还没有任何游戏记录</div>`;
      } else {
        // Game rows
        for (const id of sortedGames) {
          const game = GAME_MAP[id] || { name: id, emoji: '🎮' };
          const rayScore = Ray.games[id];
          const hebeScore = Hebe.games[id];
          const rayHasScore = rayScore !== undefined && rayScore !== null;
          const hebeHasScore = hebeScore !== undefined && hebeScore !== null;

          let winner = '';
          let rayClass = 'score-cell';
          let hebeClass = 'score-cell';
          if (rayHasScore && hebeHasScore) {
            if (rayScore > hebeScore) { winner = '👦'; rayClass += ' winner'; }
            else if (hebeScore > rayScore) { winner = '👧'; hebeClass += ' winner'; }
            else { winner = '🤝'; }
          } else if (rayHasScore) { winner = '👦'; rayClass += ' winner'; }
          else if (hebeHasScore) { winner = '👧'; hebeClass += ' winner'; }

          html += `<div class="game-row">
            <div class="game-name"><span class="game-emoji">${game.emoji}</span>${game.name}</div>
            <div class="${rayClass}">${rayHasScore ? rayScore : '<span class="no-score">—</span>'}</div>
            <div class="${hebeClass}">${hebeHasScore ? hebeScore : '<span class="no-score">—</span>'}</div>
            <div class="winner-badge">${winner}</div>
          </div>`;
        }
      }

      // Total row
      const overallWinner = tied ? '🤝' : (rayWins ? '👦 Ray' : '👧 Hebe');
      html += `<div class="total-row">
        <div class="total-label">本周总分</div>
        <div class="total-score ${!tied && rayWins ? 'winner' : ''}">${rayTotal}</div>
        <div class="total-score ${!tied && !rayWins ? 'winner' : ''}">${hebeTotal}</div>
        <div class="overall-winner" title="本周胜者">${tied ? '🤝' : (rayWins ? '👦' : '👧')}</div>
      </div>`;

      document.getElementById('ranking-list').innerHTML = html;
    }

    Player.getRankings().then(renderRankings);
  </script>
</body>
</html>
