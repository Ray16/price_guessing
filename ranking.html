<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本周排行榜</title>
  <link rel="stylesheet" href="shared/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .ranking-page { max-width: 600px; margin: 0 auto; padding: 40px 24px; }
    .ranking-page h1 { font-size: 2rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .week-label { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }
    .player-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px 28px; margin-bottom: 16px;
      display: flex; align-items: flex-start; gap: 20px; transition: border-color 0.2s;
    }
    .player-row.first { border-color: #ffd700; box-shadow: 0 0 24px rgba(255,215,0,0.12); }
    .player-row.second { border-color: #aaaaaa55; }
    .rank-avatar { font-size: 2.8rem; }
    .rank-info { flex: 1; }
    .rank-name { font-size: 1.3rem; font-weight: 700; }
    .rank-score { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .rank-score span { font-size: 0.9rem; color: var(--text-muted); font-weight: 400; }
    .game-breakdown { margin-top: 14px; }
    .game-breakdown h3 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .game-score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .game-score-row:last-child { border-bottom: none; }
    .trophy { font-size: 3rem; text-align: center; margin-bottom: 16px; }
    .loading { text-align: center; color: var(--text-muted); padding: 40px; }
  </style>
</head>
<body>
  <div class="ranking-page">
    <div class="trophy">🏆</div>
    <h1>本周排行榜</h1>
    <div class="week-label" id="week-label"></div>
    <div id="ranking-list"><div class="loading">加载中…</div></div>
    <a href="index.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;margin-top:24px">← 返回首页</a>
  </div>

  <script src="shared/hub-data.js"></script>
  <script src="shared/firebase-config.js"></script>
  <script src="shared/player.js"></script>
  <script>
    const AVATARS = { Ray: '👦', Hebe: '👧' };
    const GAME_NAMES = {};
    GAMES.forEach(g => GAME_NAMES[g.id] = g.name);

    function renderRankings({ Ray, Hebe, weekKey }) {
      document.getElementById('week-label').textContent = `📅 ${weekKey}`;

      const players = [
        { name: 'Ray', data: Ray },
        { name: 'Hebe', data: Hebe },
      ].sort((a, b) => b.data.total - a.data.total);

      document.getElementById('ranking-list').innerHTML = players.map((p, i) => {
        const games = Object.entries(p.data.games);
        const breakdown = games.length > 0
          ? `<div class="game-breakdown">
              <h3>各游戏最高分</h3>
              ${games.sort((a,b) => b[1]-a[1]).map(([id, score]) => `
                <div class="game-score-row">
                  <span>${GAME_NAMES[id] || id}</span>
                  <span style="font-weight:700">${score} 分</span>
                </div>`).join('')}
            </div>`
          : '<div style="color:var(--text-muted);font-size:0.9rem;margin-top:8px">本周暂无记录</div>';

        return `
          <div class="player-row ${i === 0 ? 'first' : 'second'}">
            <div class="rank-avatar">${AVATARS[p.name]}</div>
            <div class="rank-info">
              <div class="rank-name">${i === 0 ? '🥇' : '🥈'} ${p.name}</div>
              <div class="rank-score">${p.data.total} <span>分</span></div>
              ${breakdown}
            </div>
          </div>`;
      }).join('');
    }

    Player.getRankings().then(renderRankings);
  </script>
</body>
</html>
