<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小游戏合集</title>
  <link rel="stylesheet" href="shared/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div class="screen active" style="flex-direction:column">
      <header class="home-header">
        <h1>小游戏合集</h1>
        <p class="subtitle">选一个游戏，开始玩吧！</p>
      </header>
      <div id="game-grid" class="game-grid"></div>
    </div>
  </div>
  <script src="shared/hub-data.js"></script>
  <script>
    document.getElementById('game-grid').innerHTML = GAMES.map((g, i) => `
      <a class="game-card" href="${g.path}" style="animation-delay:${i*0.05}s">
        <div class="game-card-emoji">${g.emoji}</div>
        <div class="game-card-name">${g.name}</div>
        <div class="game-card-desc">${g.desc}</div>
      </a>
    `).join('');
  </script>
</body>
</html>
