<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Guesser</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
      <header class="home-header">
        <h1>Price Guesser</h1>
        <p class="subtitle">How well do you know prices? Pick a theme and find out!</p>
      </header>
      <div id="theme-grid" class="theme-grid"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <header class="game-header">
        <button id="btn-home" class="btn-back" aria-label="Back to home">&larr; Themes</button>
        <div class="progress">
          <span id="progress-text"></span>
        </div>
        <div class="score-display">
          Score: <span id="score">0</span>
        </div>
      </header>

      <main class="game-main">
        <div class="image-container">
          <img id="item-image" src="" alt="Guess the price of this item">
          <div id="item-name" class="item-name"></div>
        </div>

        <div id="guess-section" class="guess-section">
          <label for="price-input" id="guess-label">What's the price?</label>
          <div class="input-row">
            <span id="currency-symbol" class="currency-symbol">$</span>
            <input type="number" id="price-input" placeholder="0.00" step="0.01" min="0" autocomplete="off">
            <button id="btn-guess" class="btn-primary">OK</button>
          </div>
        </div>

        <div id="result-section" class="result-section hidden">
          <div id="result-card" class="result-card">
            <div id="result-emoji" class="result-emoji"></div>
            <div class="result-prices">
              <div class="price-row">
                <span class="price-label">Your guess</span>
                <span id="user-guess" class="price-value"></span>
              </div>
              <div class="price-row">
                <span class="price-label">Actual price</span>
                <span id="actual-price" class="price-value highlight"></span>
              </div>
              <div class="price-row">
                <span class="price-label">Difference</span>
                <span id="price-diff" class="price-value"></span>
              </div>
            </div>
            <p id="result-message" class="result-message"></p>
          </div>
          <div class="result-actions">
            <button id="btn-next" class="btn-primary">Next Item &rarr;</button>
            <button id="btn-home-2" class="btn-secondary">Back to Themes</button>
          </div>
        </div>
      </main>
    </div>

    <!-- Summary Screen -->
    <div id="summary-screen" class="screen">
      <div class="summary-content">
        <h2>Round Complete!</h2>
        <div id="summary-theme" class="summary-theme"></div>
        <div class="summary-stats">
          <div class="stat">
            <span class="stat-value" id="final-score">0</span>
            <span class="stat-label">Score</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="items-played">0</span>
            <span class="stat-label">Items</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="avg-accuracy">0%</span>
            <span class="stat-label">Avg Accuracy</span>
          </div>
        </div>
        <div class="summary-actions">
          <button id="btn-replay" class="btn-primary">Play Again</button>
          <button id="btn-home-3" class="btn-secondary">Back to Themes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
