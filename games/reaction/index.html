<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>反应测试</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <div id="game-screen" class="screen active" style="flex-direction:column">
      <header class="game-header">
        <a href="../../index.html" class="btn-back">← 返回</a>
        <div class="progress"><span id="progress-text">第 1 / 10 轮</span></div>
        <div class="score-display">最佳: <span id="best-time">—</span></div>
      </header>
      <div id="reaction-arena" class="reaction-arena waiting">
        <div id="reaction-text" class="reaction-text">点击开始</div>
        <div id="reaction-sub" class="reaction-sub"></div>
      </div>
    </div>

    <div id="summary-screen" class="screen">
      <div class="summary-content">
        <h2>测试完成！</h2>
        <div class="summary-theme">⚡ 反应时间测试</div>
        <div class="summary-stats">
          <div class="stat"><span class="stat-value" id="avg-ms">0</span><span class="stat-label">平均(ms)</span></div>
          <div class="stat"><span class="stat-value" id="best-ms">0</span><span class="stat-label">最快(ms)</span></div>
          <div class="stat"><span class="stat-value" id="rating-val">—</span><span class="stat-label">评级</span></div>
        </div>
        <div id="all-times" style="color:var(--text-muted);font-size:0.9rem;margin-bottom:28px"></div>
        <div class="summary-actions">
          <button class="btn-primary" onclick="location.reload()">再测一次</button>
          <a href="../../index.html" class="btn-secondary">返回首页</a>
        </div>
      </div>
    </div>
  </div>
  <script src="../../shared/engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
