<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猜价格</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
      <header class="home-header">
        <h1>猜价格</h1>
        <p class="subtitle">你对价格了解多少？选一个主题来试试吧！</p>
      </header>
      <div id="theme-grid" class="theme-grid"></div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <header class="game-header">
        <button id="btn-home" class="btn-back" aria-label="返回首页">&larr; 主题</button>
        <div class="progress">
          <span id="progress-text"></span>
        </div>
        <div class="score-display">
          得分: <span id="score">0</span>
        </div>
      </header>

      <main class="game-main">
        <div class="image-container">
          <img id="item-image" src="" alt="猜猜这个东西多少钱">
          <div id="item-name" class="item-name"></div>
        </div>

        <div id="guess-section" class="guess-section">
          <label for="price-input" id="guess-label">你觉得多少钱？</label>
          <div class="input-row">
            <span id="currency-symbol" class="currency-symbol">¥</span>
            <input type="number" id="price-input" placeholder="0.00" step="0.01" min="0" autocomplete="off">
            <button id="btn-guess" class="btn-primary">确定</button>
          </div>
        </div>

        <div id="result-section" class="result-section hidden">
          <div id="result-card" class="result-card">
            <div id="result-emoji" class="result-emoji"></div>
            <div class="result-prices">
              <div class="price-row">
                <span class="price-label">你的猜测</span>
                <span id="user-guess" class="price-value"></span>
              </div>
              <div class="price-row">
                <span class="price-label">实际价格</span>
                <span id="actual-price" class="price-value highlight"></span>
              </div>
              <div class="price-row">
                <span class="price-label">差距</span>
                <span id="price-diff" class="price-value"></span>
              </div>
            </div>
            <p id="result-message" class="result-message"></p>
          </div>
          <div class="result-actions">
            <button id="btn-next" class="btn-primary">下一个 &rarr;</button>
            <button id="btn-home-2" class="btn-secondary">返回主题</button>
          </div>
        </div>
      </main>
    </div>

    <!-- Summary Screen -->
    <div id="summary-screen" class="screen">
      <div class="summary-content">
        <h2>本轮结束！</h2>
        <div id="summary-theme" class="summary-theme"></div>
        <div class="summary-stats">
          <div class="stat">
            <span class="stat-value" id="final-score">0</span>
            <span class="stat-label">得分</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="items-played">0</span>
            <span class="stat-label">题数</span>
          </div>
          <div class="stat">
            <span class="stat-value" id="avg-accuracy">0%</span>
            <span class="stat-label">平均准确率</span>
          </div>
        </div>
        <div class="summary-actions">
          <button id="btn-replay" class="btn-primary">再玩一次</button>
          <button id="btn-home-3" class="btn-secondary">返回主题</button>
          <a href="../../index.html" class="btn-secondary">返回首页</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../../shared/engine.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
